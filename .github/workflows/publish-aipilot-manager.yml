name: Publish AIPilot Manager

on:
  push:
    tags:
      - "manager-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish Windows manager
    runs-on: windows-latest

    defaults:
      run:
        working-directory: manager-app

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager-app/package-lock.json

      - name: Install manager dependencies
        run: npm ci

      - name: Publish release artifacts
        run: npm run release:win
