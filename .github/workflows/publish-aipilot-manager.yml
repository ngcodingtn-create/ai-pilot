name: Publish AIPilot Manager

on:
  push:
    tags:
      - "manager-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: release:win
          - os: ubuntu-latest
            script: release:linux
          - os: macos-latest
            script: release:mac

    defaults:
      run:
        working-directory: manager-app

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager-app/package-lock.json

      - name: Install manager dependencies
        run: npm ci

      - name: Generate brand assets
        run: npm run assets:brand

      - name: Publish release artifacts
        run: npm run ${{ matrix.script }}
