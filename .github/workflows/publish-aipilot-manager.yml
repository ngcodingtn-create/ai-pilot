name: Publish AIPilot Manager

on:
  push:
    tags:
      - "v*"
      - "manager-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish ${{ matrix.label }} manager
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows
            os: windows-latest
            script: dist:win
            files: |
              manager-app/dist/*Manager-Setup-*.exe
              manager-app/dist/*Manager-Setup-*.exe.blockmap
              manager-app/dist/latest.yml
          - label: Linux
            os: ubuntu-latest
            script: dist:linux
            files: |
              manager-app/dist/*.AppImage
              manager-app/dist/*.deb
          - label: macOS
            os: macos-latest
            script: dist:mac
            files: |
              manager-app/dist/*.dmg
              manager-app/dist/*.zip

    defaults:
      run:
        working-directory: manager-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager-app/package-lock.json

      - name: Install manager dependencies
        run: npm ci

      - name: Build release artifacts
        run: npm run ${{ matrix.script }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: ${{ matrix.files }}
