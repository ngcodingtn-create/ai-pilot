name: Publish AIPilot Manager

on:
  push:
    tags:
      - "v*"
      - "manager-v*"

permissions:
  contents: write

jobs:
  publish:
    name: Publish Windows manager
    runs-on: windows-latest

    defaults:
      run:
        working-directory: manager-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: manager-app/package-lock.json

      - name: Install manager dependencies
        run: npm ci

      - name: Build Windows release artifacts
        run: npm run dist:win

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            manager-app/dist/*Manager-Setup-*.exe
            manager-app/dist/*Manager-Setup-*.exe.blockmap
            manager-app/dist/latest.yml
